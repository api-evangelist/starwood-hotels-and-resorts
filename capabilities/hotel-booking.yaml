naftiko: 1.0.0-alpha2
info:
  label: Starwood Hotel Booking
  description: Workflow capability for Starwood Hotels and Resorts hotel booking and travel planning. Combines hotel search,
    property lookup, and availability checking to support travel planning agents, OTA integrations, and corporate travel management
    platforms. Enables AI-assisted hotel discovery, comparison, and booking workflows.
  tags:
  - Hotels
  - Travel
  - Hospitality
  - Booking
  - Availability
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    STARWOOD_API_KEY: STARWOOD_API_KEY
capability:
  consumes:
  - type: http
    namespace: starwood-hotel-search
    baseUri: https://www.starwoodhotels.com/api
    description: Starwood Hotels and Resorts Hotel Search API
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{STARWOOD_API_KEY}}'
      placement: header
    resources:
    - name: hotels-search
      path: /v1/hotels/search
      description: Search Starwood hotel properties by location and dates
      operations:
      - name: search-hotels
        method: GET
        description: Search hotels by country, city, and travel dates
        inputParameters:
        - name: country
          in: query
          type: string
          required: true
          description: Two-letter ISO country code
        - name: province
          in: query
          type: string
          required: false
          description: Province or state code
        - name: city
          in: query
          type: string
          required: false
          description: City name
        - name: arrivalDate
          in: query
          type: string
          required: true
          description: Check-in date YYYY-MM-DD
        - name: departureDate
          in: query
          type: string
          required: true
          description: Check-out date YYYY-MM-DD
        - name: adults
          in: query
          type: integer
          required: false
          description: Number of adult guests
        - name: brand
          in: query
          type: string
          required: false
          description: Starwood brand code filter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: hotels-detail
      path: /v1/hotels/{hotelId}
      description: Individual hotel property operations
      operations:
      - name: get-hotel
        method: GET
        description: Get hotel property details by ID
        inputParameters:
        - name: hotelId
          in: path
          type: string
          required: true
          description: Unique hotel identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: hotels-availability
      path: /v1/hotels/{hotelId}/availability
      description: Hotel availability and rate operations
      operations:
      - name: get-hotel-availability
        method: GET
        description: Get available rooms and rates for a hotel
        inputParameters:
        - name: hotelId
          in: path
          type: string
          required: true
          description: Unique hotel identifier
        - name: arrivalDate
          in: query
          type: string
          required: true
          description: Check-in date
        - name: departureDate
          in: query
          type: string
          required: true
          description: Check-out date
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: starwood-hotel-booking-api
    description: Unified REST API for Starwood hotel search and booking workflows.
    resources:
    - path: /v1/hotels
      name: hotels
      description: Search and discover Starwood hotel properties
      operations:
      - method: GET
        name: search-hotels
        description: Search Starwood hotels by location and travel dates
        call: starwood-hotel-search.search-hotels
        with:
          country: rest.country
          province: rest.province
          city: rest.city
          arrivalDate: rest.arrivalDate
          departureDate: rest.departureDate
          adults: rest.adults
          brand: rest.brand
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hotels/{hotelId}
      name: hotel-detail
      description: Get complete hotel property details
      operations:
      - method: GET
        name: get-hotel
        description: Get detailed information for a Starwood hotel
        call: starwood-hotel-search.get-hotel
        with:
          hotelId: rest.hotelId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/hotels/{hotelId}/availability
      name: hotel-availability
      description: Check hotel room availability and rates
      operations:
      - method: GET
        name: get-hotel-availability
        description: Get available rooms, rates, and SPG point redemption options
        call: starwood-hotel-search.get-hotel-availability
        with:
          hotelId: rest.hotelId
          arrivalDate: rest.arrivalDate
          departureDate: rest.departureDate
          adults: rest.adults
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: starwood-hotel-booking-mcp
    transport: http
    description: MCP server for AI-assisted hotel discovery and travel planning using Starwood properties.
    tools:
    - name: search-hotels
      description: Search Starwood hotel properties by destination location and travel dates. Returns hotels with rates, SPG
        category, amenities, and Starpoints redemption options.
      hints:
        readOnly: true
        openWorld: true
      call: starwood-hotel-search.search-hotels
      with:
        country: tools.country
        province: tools.province
        city: tools.city
        arrivalDate: tools.arrivalDate
        departureDate: tools.departureDate
        adults: tools.adults
        brand: tools.brand
      outputParameters:
      - type: object
        mapping: $.
    - name: get-hotel-details
      description: Get comprehensive information about a specific Starwood hotel property including address, amenities, dining,
        and contact information.
      hints:
        readOnly: true
        openWorld: true
      call: starwood-hotel-search.get-hotel
      with:
        hotelId: tools.hotelId
      outputParameters:
      - type: object
        mapping: $.
    - name: check-hotel-availability
      description: Check available room types and rates for a Starwood hotel on specific travel dates. Returns room categories,
        nightly rates, total stay price, and SPG award night options.
      hints:
        readOnly: true
        openWorld: true
      call: starwood-hotel-search.get-hotel-availability
      with:
        hotelId: tools.hotelId
        arrivalDate: tools.arrivalDate
        departureDate: tools.departureDate
        adults: tools.adults
      outputParameters:
      - type: object
        mapping: $.
