description: The Starwood Hotels and Resorts brand was acquired by Marriott International in 2016 and
  consolidated under Marriott Bonvoy. There is no standalone Starwood developer or partner API program
  with public pricing; any hospitality / loyalty / distribution integration runs under Marriott's partner
  channels (GDS, distribution partners, channel managers) on private contracts.
sources:
  - https://www.starwoodhotels.com/
notes: Starwood is a defunct standalone brand (acquired by Marriott 2016). No public Starwood-branded
  developer surface exists; trimmed to a single contact-sales placeholder pending direct engagement
  with Marriott's distribution/partnership channels.
