principles:
  - name: Visibility
    description: Visibility is whatever Marriott's partner reporting (channel manager / GDS feed) provides;
      there is no public Starwood usage API.
  - name: Allocation
    description: Allocate the partnership cost line in your own ERP — Marriott does not break it down
      under a Starwood label.
  - name: Optimization
    description: Optimization happens via contract / channel-mix renegotiation, not pay-as-you-go tuning.
  - name: Accountability
    description: A single business owner of the Marriott partnership should own this cost line and renewal.
