description: Starwood Hotels and Resorts has no standalone metered API surface — the brand is now part
  of Marriott. There is no public FOCUS-billable line for Starwood-branded API usage; any cost lives
  in a Marriott partner contract.
sources:
  - https://www.starwoodhotels.com/
notes: No public Starwood API billing surface exists. Meters and FOCUS values are placeholders pending
  a Marriott partner engagement.
